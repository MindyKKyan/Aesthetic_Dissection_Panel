[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aesthetic-core"
version = "0.1.0"
description = "Shared CLIP, LAION, dissection, and style-alignment metrics"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.1.0",
    "torchvision>=0.16.0",
    "transformers>=4.36.0",
    "pillow>=10.0.0",
    "numpy>=1.26.0",
    "opencv-python-headless>=4.8.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["aesthetic_core*"]
